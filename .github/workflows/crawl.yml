name: Crawl Deal 1K

on:
  schedule:
    - cron: '45 * * * *'   # 18:45 ICT → chạy trước deal 19h
  workflow_dispatch:        # cho phép chạy thủ công trên UI

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # cần để commit data.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps
          
      - name: Run crawler
        run: python getdeal1k.py

      - name: Commit & push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: update data.json $(date +'%H:%M %d/%m/%Y')"
          git push