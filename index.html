<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deal 1K – Săn Hời Cùng Shopee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #ff5722;
      --orange-dark: #e64a19;
      --orange-light: #ff8a65;
      --red: #f44336;
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #212121;
      --muted: #9e9e9e;
      --border: #eeeeee;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { font-size: 14px; }
    body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── COUNTDOWN ── */
    #countdownBar {
      background: linear-gradient(90deg, #b71c1c, #e53935);
      color: #fff;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 7px 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 12px; font-weight: 800;
      letter-spacing: .3px;
    }
    #countdownBar .digits {
      display: flex; align-items: center; gap: 3px;
    }
    #countdownBar .digit {
      background: rgba(0,0,0,.3);
      border-radius: 5px;
      padding: 2px 7px;
      font-size: 15px;
      font-weight: 900;
      min-width: 28px; text-align: center;
      font-variant-numeric: tabular-nums;
    }
    #countdownBar .sep { font-size: 14px; font-weight: 900; opacity: .7; }
    #countdownSlot { color: #ffcc80; font-weight: 900; }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, var(--orange) 0%, #ff8f00 100%);
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(255,87,34,.35);
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px 8px;
      gap: 8px;
    }
    .logo {
      font-family: 'Nunito', sans-serif;
      font-weight: 900; font-size: 18px;
      color: #fff;
      line-height: 1;
      flex-shrink: 0;
    }
    .logo span { color: #ffe082; }
    .updated-at {
      font-size: 10px; color: rgba(255,255,255,.75); font-weight: 600;
      background: rgba(0,0,0,.15); border-radius: 6px;
      padding: 3px 8px; flex-shrink: 0; white-space: nowrap;
    }
    .search-wrap {
      position: relative; flex: 1;
    }
    .search-wrap input {
      width: 100%; padding: 8px 10px 8px 32px;
      border-radius: 10px; border: none;
      font-size: 12.5px; font-family: 'Be Vietnam Pro', sans-serif;
      outline: none;
      background: rgba(255,255,255,.95);
      color: var(--text);
    }
    .search-wrap .s-icon {
      position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
      font-size: 14px; pointer-events: none;
    }

    /* ── FILTER TABS ── */
    .filter-row {
      display: flex; align-items: center; gap: 6px;
      overflow-x: auto; padding: 0 12px 8px;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-label {
      font-size: 10px; font-weight: 800;
      color: rgba(255,255,255,.55);
      white-space: nowrap; flex-shrink: 0;
      text-transform: uppercase; letter-spacing: .6px;
    }
    .chip {
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 11.5px; font-weight: 700;
      white-space: nowrap; flex-shrink: 0;
      cursor: pointer; border: none;
      transition: all .15s ease;
      font-family: 'Be Vietnam Pro', sans-serif;
    }
    .chip.active   { background: #fff; color: var(--orange); box-shadow: 0 2px 6px rgba(0,0,0,.15); }
    .chip.inactive { background: rgba(0,0,0,.15); color: rgba(255,255,255,.9); }

    /* ── RESULT COUNT ── */
    .result-bar {
      padding: 8px 10px 4px;
      font-size: 11px; color: var(--muted); font-weight: 500;
    }
    .result-bar b { color: var(--orange); }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 8px 80px;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 1px 6px rgba(0,0,0,.06);
      display: flex; flex-direction: column;
      position: relative;
      animation: fadeUp .3s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* badges */
    .badge-pct {
      position: absolute; top: 7px; left: 7px; z-index: 3;
      background: var(--red); color: #fff;
      font-size: 10px; font-weight: 800;
      padding: 2px 6px; border-radius: 6px;
      font-family: 'Nunito', sans-serif;
      box-shadow: 0 2px 4px rgba(0,0,0,.2);
    }
    .badge-sold-out {
      position: absolute; inset: 0; z-index: 5;
      background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      border-radius: 14px;
    }
    .badge-sold-out span {
      background: #fff; color: var(--red);
      font-weight: 900; font-size: 11px;
      padding: 4px 10px; border-radius: 20px;
      font-family: 'Nunito', sans-serif;
    }
    .share-btn {
      position: absolute; top: 6px; right: 6px; z-index: 4;
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(255,255,255,.92);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.18);
      transition: transform .1s;
    }
    .share-btn:active { transform: scale(.88); }
    .share-btn svg { width: 13px; height: 13px; stroke: var(--orange); }

    /* image */
    .img-wrap { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #f0f0f0; }
    .img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .time-badge {
      position: absolute; bottom: 6px; left: 6px;
      background: rgba(0,0,0,.58);
      color: #fff; font-size: 9.5px; font-weight: 700;
      padding: 2px 7px; border-radius: 6px;
      backdrop-filter: blur(4px);
    }

    /* body */
    .card-body { padding: 8px 8px 0; flex: 1; display: flex; flex-direction: column; }
    .card-title {
      font-size: 11.5px; font-weight: 600; color: #333;
      line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      min-height: 33px;
    }

    /* price */
    .price-row { display: flex; align-items: baseline; gap: 4px; margin-top: 6px; }
    .price-now {
      font-family: 'Nunito', sans-serif;
      font-size: 18px; font-weight: 900; color: var(--orange);
      line-height: 1;
    }
    .price-unit { font-size: 11px; font-weight: 700; color: var(--orange); }
    .price-orig { font-size: 10px; color: var(--muted); text-decoration: line-through; }

    /* stock */
    .stock-row { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
    .stock-label { font-size: 10px; color: var(--muted); font-weight: 500; }
    .stock-label b { color: var(--red); }
    .tag {
      font-size: 9.5px; font-weight: 800;
      padding: 2px 7px; border-radius: 5px;
      font-family: 'Nunito', sans-serif;
    }
    .tag-hot      { background: #fff3e0; color: #e65100; }
    .tag-low      { background: #fce4ec; color: #c62828; }
    .tag-normal   { background: #f3f4f6; color: #6b7280; }

    /* stock bar */
    .stock-bar-wrap { margin-top: 5px; height: 4px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
    .stock-bar { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--orange-light), var(--red)); transition: width .4s ease; }

    /* buy btn */
    .buy-btn {
      display: block; width: 100%;
      background: linear-gradient(90deg, var(--orange), #ff8f00);
      color: #fff;
      font-size: 11px; font-weight: 800;
      text-align: center;
      padding: 9px 6px;
      margin-top: 8px; margin-bottom: 8px;
      border-radius: 10px;
      text-decoration: none;
      letter-spacing: .4px;
      font-family: 'Nunito', sans-serif;
      box-shadow: 0 3px 8px rgba(255,87,34,.3);
      transition: opacity .1s;
    }
    .buy-btn:active { opacity: .85; }

    /* ── SKELETON ── */
    .skeleton { background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 6px; }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    .skel-img   { width: 100%; aspect-ratio: 1/1; }
    .skel-line  { height: 11px; margin: 6px 8px 0; }
    .skel-line2 { width: 60%; height: 11px; margin: 4px 8px 0; }
    .skel-price { width: 50%; height: 20px; margin: 8px 8px 0; }
    .skel-btn   { height: 32px; margin: 8px 8px 8px; border-radius: 10px; }

    /* ── NO RESULT ── */
    #noResult { display: none; grid-column: span 2; text-align: center; padding: 60px 20px; color: var(--muted); }
    #noResult .emoji { font-size: 48px; margin-bottom: 12px; }
    #noResult p { font-size: 13px; }
    #noResult button { margin-top: 12px; color: var(--orange); font-weight: 700; background: none; border: none; cursor: pointer; font-size: 13px; }

    /* ── FOOTER ── */
    footer { text-align: center; padding: 16px; font-size: 10.5px; color: var(--muted); }
  </style>
</head>
<body>

<!-- Countdown -->
<div id="countdownBar">
  ⚡ Deal <span id="countdownSlot">17:00</span> bắt đầu sau
  <div class="digits">
    <span class="digit" id="cdH">00</span>
    <span class="sep">:</span>
    <span class="digit" id="cdM">00</span>
    <span class="sep">:</span>
    <span class="digit" id="cdS">00</span>
  </div>
</div>

<!-- Header -->
<header>
  <div class="header-top">
    <div class="logo">Gia<span>1K</span> 🔥</div>
    <div class="search-wrap">
      <span class="s-icon">🔍</span>
      <input id="searchInput" type="text" placeholder="Tìm sản phẩm..." oninput="filterDeals()">
    </div>
    <div class="updated-at" id="updatedAt">--:--</div>
  </div>
  <div class="filter-row" id="timeFilterRow">
    <!-- rendered by JS -->
  </div>
  <div class="filter-row" id="priceFilterRow" style="padding-bottom:10px">
    <!-- rendered by JS -->
  </div>
</header>

<!-- Result bar -->
<div class="result-bar" id="resultBar"></div>

<!-- Grid -->
<div class="grid" id="productGrid">
  <!-- Skeleton placeholders -->
  ${Array(6).fill(0).map(() => `
  <div class="card">
    <div class="skeleton skel-img"></div>
    <div class="skeleton skel-line"></div>
    <div class="skeleton skel-line2"></div>
    <div class="skeleton skel-price"></div>
    <div class="skeleton skel-btn"></div>
  </div>`).join('')}
</div>

<div id="noResult">
  <div class="emoji">🏜️</div>
  <p>Không tìm thấy deal nào phù hợp!</p>
  <button onclick="resetFilters()">Xoá bộ lọc</button>
</div>

<footer>© 2026 Sale1k – Dữ liệu cập nhật tự động từ Shopee</footer>

<script>
// ── State ──────────────────────────────────────────────
let allDeals = [];
let currentTime  = 'all';
let currentPrice = 'all';

// ── Load data ──────────────────────────────────────────
async function loadDealsData() {
  try {
    const res = await fetch('data.json');
    if (!res.ok) throw new Error('Không tìm thấy data.json');
    const data = await res.json();
    allDeals = data.sort((a, b) => Number(a.price) - Number(b.price));

    // Thời gian cập nhật
    const now = new Date();
    document.getElementById('updatedAt').textContent =
      '🕐 ' + now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

    renderFilters();
    filterDeals();
    startCountdown();
  } catch (e) {
    console.error(e);
    document.getElementById('productGrid').innerHTML = `
      <div style="grid-column:span 2;text-align:center;padding:40px 20px;color:#ef4444;background:#fff;border-radius:12px;margin:8px">
        <p style="font-weight:700">⚠️ Lỗi tải dữ liệu</p>
        <p style="font-size:11px;margin-top:6px;color:#9ca3af">Chạy qua Live Server hoặc GitHub Pages</p>
      </div>`;
  }
}

// ── Render filters ─────────────────────────────────────
function renderFilters() {
  const slots = [...new Set(allDeals.map(d => d.time_slot))].sort();

  const timeChips = [
    { val: 'all', label: '⚡ Tất cả' },
    ...slots.map(s => ({ val: s, label: '🕐 ' + s }))
  ];
  const priceChips = [
    { val: 'all',   label: 'Mọi giá' },
    { val: '1k',    label: '🔥 Deal 1K' },
    { val: '9k',    label: '💥 Deal 9K' },
    { val: 'other', label: 'Giá khác' },
  ];

  document.getElementById('timeFilterRow').innerHTML =
    `<span class="filter-label">Giờ</span>` +
    timeChips.map(c =>
      `<button class="chip ${c.val === currentTime ? 'active' : 'inactive'}" onclick="selectTime('${c.val}')">${c.label}</button>`
    ).join('');

  document.getElementById('priceFilterRow').innerHTML =
    `<span class="filter-label">Giá</span>` +
    priceChips.map(c =>
      `<button class="chip ${c.val === currentPrice ? 'active' : 'inactive'}" onclick="selectPrice('${c.val}')">${c.label}</button>`
    ).join('');
}

// ── Select filters ─────────────────────────────────────
function selectTime(val) {
  currentTime = val;
  renderFilters();
  filterDeals();
}
function selectPrice(val) {
  currentPrice = val;
  renderFilters();
  filterDeals();
}
function resetFilters() {
  currentTime = 'all'; currentPrice = 'all';
  document.getElementById('searchInput').value = '';
  renderFilters(); filterDeals();
}

// ── Filter logic ───────────────────────────────────────
function filterDeals() {
  const kw = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = allDeals.filter(d => {
    const p = Number(d.price);
    const matchTime  = currentTime === 'all'  || d.time_slot === currentTime;
    const matchKey   = !kw || d.title.toLowerCase().includes(kw);
    const matchPrice =
      currentPrice === 'all'   ? true :
      currentPrice === '1k'    ? p <= 1000 :
      currentPrice === '9k'    ? p > 1000 && p <= 9000 :
      /* other */                p > 9000;
    return matchTime && matchKey && matchPrice;
  });

  document.getElementById('resultBar').innerHTML =
    `Hiển thị <b>${filtered.length}</b> deal${filtered.length !== allDeals.length ? ` / ${allDeals.length}` : ''}`;

  renderGrid(filtered);
}

// ── Render grid ────────────────────────────────────────
function renderGrid(data) {
  const grid     = document.getElementById('productGrid');
  const noResult = document.getElementById('noResult');

  if (!data.length) {
    grid.innerHTML = '';
    noResult.style.display = 'block';
    return;
  }
  noResult.style.display = 'none';

  grid.innerHTML = data.map((item, i) => {
    const price    = Number(item.price);
    const origEst  = price * (1 / (1 - (item.discount_pct || 80) / 100));  // fallback estimate
    const pctOff   = item.discount_pct || Math.round((1 - price / origEst) * 100);
    const qty      = Number(item.quantity);
    const maxQty   = 50; // reference max for bar
    const barPct   = Math.min(100, Math.round((1 - qty / maxQty) * 100));  // sold %

    // urgency tag
    let tagClass = 'tag-normal', tagLabel = 'Deal hời';
    if (qty <= 5)       { tagClass = 'tag-low';  tagLabel = '🚨 Gần hết'; }
    else if (qty <= 15) { tagClass = 'tag-hot';  tagLabel = '🔥 HOT'; }

    const isSoldOut = qty === 0;
    const titleEsc = item.title.replace(/'/g,"&#39;").replace(/"/g,'&quot;');

    return `
    <div class="card" style="animation-delay:${i * 0.04}s">
      ${isSoldOut ? `<div class="badge-sold-out"><span>HẾT HÀNG</span></div>` : ''}
      <div class="badge-pct">-${pctOff}%</div>
      <button class="share-btn" onclick="shareDeal('${titleEsc}','${item.product_link}')" title="Chia sẻ">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
      </button>
      <a href="${item.product_link}" target="_blank" rel="noreferrer" style="display:contents">
        <div class="img-wrap">
          <img src="${item.image_url}" alt="${titleEsc}" loading="lazy"
            onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23f0f0f0%22 width=%22100%22 height=%22100%22/></svg>'">
          <div class="time-badge">🕐 ${item.time_slot}</div>
        </div>
        <div class="card-body">
          <div class="card-title">${item.title.toLowerCase()}</div>
          <div class="price-row">
            <span class="price-now">${price.toLocaleString('vi-VN')}</span>
            <span class="price-unit">đ</span>
          </div>
          <div class="stock-row">
            <span class="stock-label">SL: <b>${qty}</b></span>
            <span class="tag ${tagClass}">${tagLabel}</span>
          </div>
          <div class="stock-bar-wrap">
            <div class="stock-bar" style="width:${barPct}%"></div>
          </div>
        </div>
        <div class="buy-btn">⚡ MUA NGAY</div>
      </a>
    </div>`;
  }).join('');
}

// ── Share ──────────────────────────────────────────────
async function shareDeal(title, url) {
  try {
    if (navigator.share) {
      await navigator.share({ title, url });
    } else {
      await navigator.clipboard.writeText(url);
      alert('Đã copy link vào clipboard!');
    }
  } catch {}
}

// ── Countdown ──────────────────────────────────────────
function startCountdown() {
  // Lấy danh sách giờ từ data thực tế, sort tăng dần
  // time_slot dạng "17:00" → tách lấy số giờ
  const slotHours = [...new Set(allDeals.map(d => {
    const parts = d.time_slot.split(':');
    return parseInt(parts[0], 10);
  }))].sort((a, b) => a - b);

  // Slot đầu tiên (nhỏ nhất) dùng làm fallback cho ngày hôm sau
  const firstSlot = slotHours[0];

  function getNextSlot() {
    const now = new Date();
    const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();

    // Tìm slot gần nhất còn chưa qua trong ngày hôm nay
    for (const sh of slotHours) {
      const diffSec = (sh - h) * 3600 - m * 60 - s;
      if (diffSec > 0) return { label: String(sh).padStart(2,'0') + ':00', sec: diffSec };
    }

    // Đã qua hết tất cả slot hôm nay → đếm đến slot đầu tiên ngày mai
    const diffSec = (24 - h + firstSlot) * 3600 - m * 60 - s;
    return { label: String(firstSlot).padStart(2,'0') + ':00', sec: diffSec };
  }

  function tick() {
    const { label, sec } = getNextSlot();
    document.getElementById('countdownSlot').textContent = label;
    const hh = Math.floor(sec / 3600);
    const mm = Math.floor((sec % 3600) / 60);
    const ss = sec % 60;
    document.getElementById('cdH').textContent = String(hh).padStart(2,'0');
    document.getElementById('cdM').textContent = String(mm).padStart(2,'0');
    document.getElementById('cdS').textContent = String(ss).padStart(2,'0');
  }

  tick();
  setInterval(tick, 1000);
}

// ── Boot ───────────────────────────────────────────────
window.onload = loadDealsData;
</script>
</body>
</html>
